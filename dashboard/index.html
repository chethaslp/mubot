<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mubot Dashboard</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 800px;
        }
        h1 { text-align: center; color: #333; }
        .hidden { display: none; }
        .input-group { margin-bottom: 1rem; }
        input { 
            width: 100%; 
            padding: 10px; 
            margin-top: 5px; 
            border: 1px solid #ddd; 
            border-radius: 4px; 
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #25d366;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
        }
        button:hover { background-color: #128c7e; }
        .error { color: red; text-align: center; margin-top: 10px; }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }
        th { background-color: #f8f9fa; }
        tr:hover { background-color: #f5f5f5; }
    </style>
</head>
<body>

    <div id="login-view" class="container">
        <h1>Mubot Login</h1>
        <div class="input-group">
            <input type="password" id="password" placeholder="Enter password">
        </div>
        <button onclick="login()">Login</button>
        <div id="login-error" class="error"></div>
    </div>

    <div id="dashboard-view" class="container hidden">
        <h1>Bot Groups</h1>
        <div style="text-align: right; margin-bottom: 10px;">
            <button onclick="logoutWhatsApp()" style="width: auto; background-color: #ffc107; color: black; margin-right: 10px;">Disconnect WhatsApp</button>
            <button onclick="logout()" style="width: auto; background-color: #dc3545;">Logout Dashboard</button>
        </div>
        <div id="loading">Loading groups...</div>
        <table id="groups-table" class="hidden">
            <thead>
                <tr>
                    <th>Subject</th>
                    <th>Participants</th>
                    <th>Created</th>
                    <th>ID</th>
                </tr>
            </thead>
            <tbody id="groups-body"></tbody>
        </table>
    </div>

    <div id="qr-view" class="container hidden">
        <h1>Scan to Connect</h1>
        <div id="qr-container" style="text-align: center; margin: 20px;"></div>
        <p style="text-align: center; color: #666;">Open WhatsApp > Menu > Linked Devices > Link a Device</p>
        <button onclick="logout()" style="width: auto; background-color: #dc3545; display: block; margin: 20px auto;">Logout</button>
    </div>

    <script>
        const API_URL = window.location.origin;

        function showView(viewName) {
            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('dashboard-view').classList.add('hidden');
            document.getElementById('qr-view').classList.add('hidden');
            document.getElementById(viewName).classList.remove('hidden');
        }

        async function login() {
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('login-error');
            
            try {
                const res = await fetch(`${API_URL}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    localStorage.setItem('mubot_token', data.token);
                    loadDashboard();
                } else {
                    errorDiv.textContent = data.error || 'Login failed';
                }
            } catch (e) {
                errorDiv.textContent = 'Connection error';
            }
        }

        function logout() {
            localStorage.removeItem('mubot_token');
            showView('login-view');
        }

        async function logoutWhatsApp() {
            if (!confirm('Are you sure you want to disconnect the WhatsApp session? The bot will stop working until re-scanned.')) return;

            const token = localStorage.getItem('mubot_token');
            if (!token) return logout();

            try {
                const res = await fetch(`${API_URL}/api/logout-session`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (res.ok) {
                    alert('WhatsApp session disconnected successfully.');
                    loadDashboard(); // Will redirect to QR view
                } else {
                    alert('Failed to disconnect session.');
                }
            } catch (e) {
                console.error(e);
                alert('Connection error.');
            }
        }

        async function loadDashboard() {
            const token = localStorage.getItem('mubot_token');
            if (!token) return logout();

            try {
                // Check bot status first
                const statusRes = await fetch(`${API_URL}/api/bot-status`, {
                     headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (statusRes.status === 401) return logout();
                const statusData = await statusRes.json();
                
                if (statusData.status === 'qr') {
                    showView('qr-view');
                    document.getElementById('qr-container').innerHTML = `<img src="${statusData.qrCode}" style="width: 250px; height: 250px;" />`;
                    setTimeout(loadDashboard, 3000); 
                    return;
                } else if (statusData.status === 'connecting') {
                     showView('qr-view'); 
                     document.getElementById('qr-container').innerHTML = '<p>Connecting...</p>';
                     setTimeout(loadDashboard, 3000);
                     return;
                }

                showView('dashboard-view');
                const res = await fetch(`${API_URL}/api/groups`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (res.status === 401) return logout();
                
                const groups = await res.json();
                const tbody = document.getElementById('groups-body');
                tbody.innerHTML = '';
                
                groups.forEach(g => {
                    const date = new Date(g.creation * 1000).toLocaleDateString();
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${g.subject}</td>
                        <td>${g.participants}</td>
                        <td>${date}</td>
                        <td style="font-size: 0.8em; color: gray;">${g.id}</td>
                    `;
                    tbody.appendChild(tr);
                });
                
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('groups-table').classList.remove('hidden');

            } catch (e) {
                console.error(e);
                document.getElementById('loading').textContent = 'Failed to load groups.';
            }
        }

        // Auto-login if token exists
        if (localStorage.getItem('mubot_token')) {
            loadDashboard();
        }
    </script>
</body>
</html>
